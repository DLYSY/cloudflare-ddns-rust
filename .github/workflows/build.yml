name: Build
permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  release-linux:
    if: ${{ github.ref_name == 'main' }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: quay.io login
      uses: docker/login-action@v4
      with:
        registry: quay.io
        username: ${{ secrets.QUAY_IO_USERNAME }}
        password: ${{ secrets.QUAY_IO_PASSWORD }}

    - name: Build
      run: |
        sudo apt install musl-tools -y
        rustup target add x86_64-unknown-linux-musl
        cargo build --target x86_64-unknown-linux-musl --release
        docker build -f linux.dockerfile -t quay.io/dlysy/cloudflareddns:linux .
        docker push quay.io/dlysy/cloudflareddns:linux

    - name: Archive Bin
      uses: actions/upload-artifact@v7
      with:
        name: ddns_rust-linux-x86_64
        path: target/x86_64-unknown-linux-musl/release/ddns_rust
    
    - name: Build Skylake
      env: 
        RUSTFLAGS: -C target-cpu=skylake
      run: cargo build --target x86_64-unknown-linux-musl --release
    
    - name: Archive Bin (Skylake)
      uses: actions/upload-artifact@v7
      with:
        name: ddns_rust-linux-x86_64-skylake
        path: target/x86_64-unknown-linux-musl/release/ddns_rust



  release-windows:
    if: ${{ github.ref_name == 'main' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: quay.io login
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_IO_USERNAME }}
          password: ${{ secrets.QUAY_IO_PASSWORD }}

      - name: Build
        run: |
          cargo build --release
          docker build -f windows.dockerfile -t quay.io/dlysy/cloudflareddns:windows .
          docker push quay.io/dlysy/cloudflareddns:windows

      - name: Archive production artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ddns_rust-windows-x86_64
          path: target/release/ddns_rust.exe

  debug-linux:
    if: ${{ github.ref_name != 'main' }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Build
      run: |
        sudo apt install musl-tools -y
        rustup target add x86_64-unknown-linux-musl
        cargo build --target x86_64-unknown-linux-musl

  debug-windows:
    if: ${{ github.ref_name != 'main' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build
        run: |
          cargo build